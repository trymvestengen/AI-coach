name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web:
    name: Web (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

  api:
    name: API (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - run: pip install -r requirements.txt

      - run: pytest

  schema-docs:
    name: Schema docs in sync
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Krev ARCHITECTURE.md-oppdatering ved skjemaendringer
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          CHANGED="$(git diff --name-only "origin/$BASE_REF...HEAD")"
          echo "Endrede filer mot $BASE_REF:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -q '^api/db/migrations/'; then
            if ! echo "$CHANGED" | grep -qx 'docs/ARCHITECTURE.md'; then
              echo "::error::Migrasjoner under api/db/migrations/ er endret uten at docs/ARCHITECTURE.md også er oppdatert. Oppdater skjemadokumentasjonen i samme PR."
              exit 1
            fi
          fi
          echo "schema-docs: OK"
