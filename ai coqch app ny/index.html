<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI Coach — Visual Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ac-ui: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --ac-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body, #root { font-family: var(--ac-ui); -webkit-font-smoothing: antialiased; }

  /* Global animations used by the voice orb + buttons */
  @keyframes acBreath { 0%,100% { transform: scale(0.98); opacity: 0.85; } 50% { transform: scale(1.04); opacity: 1; } }
  @keyframes acSpin   { to { transform: rotate(360deg); } }
  @keyframes acPing   { 0% { r: 30; opacity: 0.9; } 100% { r: 70; opacity: 0; } }
  @keyframes acButtonPulse { 0%,100% { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4); } 50% { box-shadow: inset 0 0 0 2px rgba(255,255,255,0.7); } }
  @keyframes acBar0 { 0%,100%{ transform: scaleY(1);} 50%{ transform: scaleY(0.4);} }
  @keyframes acBar1 { 0%,100%{ transform: scaleY(0.6);} 50%{ transform: scaleY(1.3);} }
  @keyframes acBar2 { 0%,100%{ transform: scaleY(1.2);} 50%{ transform: scaleY(0.5);} }
  @keyframes acBar3 { 0%,100%{ transform: scaleY(0.7);} 50%{ transform: scaleY(1.4);} }
  @keyframes acBar4 { 0%,100%{ transform: scaleY(1);} 50%{ transform: scaleY(0.7);} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="components-page.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "light",
  "accent": "#fe6a3d",
  "gender": "f",
  "lang": "en",
  "font": "geist",
  "orbState": "listening"
}/*EDITMODE-END*/;

// Coach derives from user gender — personality is permanently friendly.
const AC_COACH_BY_GENDER = {
  f: { name: 'Nora', gender: 'f', blurb: 'Warm, encouraging, explains the why.' },
  m: { name: 'Theo', gender: 'm', blurb: 'Warm, encouraging, explains the why.' },
  x: { name: 'Kai',  gender: 'x', blurb: 'Warm, encouraging, explains the why.' },
};

function Frame({ label, mode, t, accent, persona, lang, children, variant, width = 390, height = 844 }) {
  // Inject CSS var for persona/accent into a wrapper so children can read it via CSS
  return (
    <div data-screen-label={label}
      style={{
        '--ac-accent': accent,
        position: 'relative',
      }}>
      <IOSDevice width={width} height={height} dark={mode === 'dark'}>
        {children}
      </IOSDevice>
    </div>
  );
}

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = React.useMemo(() => acResolveTheme(tw.mode, tw.persona), [tw.mode, tw.persona]);
  const accent = tw.accent || theme.accent;
  const accentGlow = theme.accentGlow;
  const t = AC_COPY[tw.lang] || AC_COPY.en;

  // Apply font stack to CSS vars live
  React.useEffect(() => {
    const f = AC_FONT_STACKS[tw.font] || AC_FONT_STACKS.geist;
    document.documentElement.style.setProperty('--ac-ui',   f.ui);
    document.documentElement.style.setProperty('--ac-mono', f.mono);
    document.documentElement.style.setProperty('--ac-textTer', theme.textTer);
  }, [tw.font, theme]);

  // Page background subtly reflects the accent + mode
  React.useEffect(() => {
    document.body.style.background = tw.mode === 'dark' ? '#1a1816' : '#f0eee9';
  }, [tw.mode]);

  // Common props for all frames
  const coach = AC_COACH_BY_GENDER[tw.gender] || AC_COACH_BY_GENDER.f;
  const common = { mode: tw.mode, t, accent, lang: tw.lang };

  return (
    <>
      <DesignCanvas>
        {/* ── Voice Session — hero, locked halo orb × states ───── */}
        <DCSection id="voice" title="Voice Session" subtitle="The hero screen. Layered halo orb × four states. Dark + light.">
          <DCArtboard id="voice-listening" label="Listening" width={390} height={844}>
            <Frame label="Voice listening" {...common}>
              <ScreenVoiceSession theme={theme} t={t} accent={accent} coach={coach} orbState="listening"/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="voice-thinking" label="Thinking" width={390} height={844}>
            <Frame label="Voice thinking" {...common}>
              <ScreenVoiceSession theme={theme} t={t} accent={accent} coach={coach} orbState="thinking"/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="voice-speaking" label="Speaking" width={390} height={844}>
            <Frame label="Voice speaking" {...common}>
              <ScreenVoiceSession theme={theme} t={t} accent={accent} coach={coach} orbState="speaking"/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="voice-light" label="Listening · light" width={390} height={844}>
            <Frame label="Voice light" {...common} mode="light">
              {(() => { const lt = acResolveTheme('light'); return (
                <ScreenVoiceSession theme={lt} t={t} accent={lt.accent} coach={coach} orbState="listening"/>
              ); })()}
            </Frame>
          </DCArtboard>
        </DCSection>

        {/* ── Home / Today ───────────────────────────── */}
        <DCSection id="home" title="Home / Today" subtitle="First open of the day. Feels like a coach's text message.">
          <DCArtboard id="home-dark" label="Today · dark" width={390} height={844}>
            <Frame label="Home dark" {...common}>
              <ScreenHome theme={theme} t={t} accent={accent}/>
              <TabBar active="home" theme={theme}/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="home-light" label="Today · light" width={390} height={844}>
            <Frame label="Home light" {...common} mode="light">
              {(() => { const lt = acResolveTheme('light'); return (<>
                <ScreenHome theme={lt} t={t} accent={lt.accent}/>
                <TabBar active="home" theme={lt}/>
              </>); })()}
            </Frame>
          </DCArtboard>
        </DCSection>

        {/* ── Workout Log ───────────────────────────── */}
        <DCSection id="log" title="Workout Log" subtitle="Scannable list of past sessions. Tap a card to expand sets.">
          <DCArtboard id="log-dark" label="Log · collapsed" width={390} height={844}>
            <Frame label="Log dark" {...common}>
              <ScreenLog theme={theme} t={t} accent={accent}/>
              <TabBar active="log" theme={theme}/>
            </Frame>
          </DCArtboard>
        </DCSection>

        {/* ── Program View ──────────────────────────── */}
        <DCSection id="program" title="Program View" subtitle="Week schedule, today highlighted, planned exercises below.">
          <DCArtboard id="program-dark" label="Program · Week 4" width={390} height={844}>
            <Frame label="Program" {...common}>
              <ScreenProgram theme={theme} t={t} accent={accent}/>
              <TabBar active="program" theme={theme}/>
            </Frame>
          </DCArtboard>
        </DCSection>

        {/* ── Onboarding — signup flow ─────────────── */}
        <DCSection id="onboarding" title="Onboarding" subtitle="Real signup: welcome → account → profile → goal → equipment. Gender drives coach.">
          <DCArtboard id="ob-welcome" label="00 Welcome" width={390} height={844}>
            <Frame label="Welcome" {...common}><ScreenOnboardWelcome theme={theme} accent={accent}/></Frame>
          </DCArtboard>
          <DCArtboard id="ob-account" label="01 Account" width={390} height={844}>
            <Frame label="Account" {...common}><ScreenOnboardAccount theme={theme} accent={accent}/></Frame>
          </DCArtboard>
          <DCArtboard id="ob-profile" label="02 Profile" width={390} height={844}>
            <Frame label="Profile" {...common}>
              <ScreenOnboardProfile theme={theme} accent={accent} gender={tw.gender} onGender={(v) => setTweak('gender', v)}/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="ob-goal" label="03 Goal" width={390} height={844}>
            <Frame label="Goal" {...common}><ScreenOnboardGoal theme={theme} accent={accent}/></Frame>
          </DCArtboard>
          <DCArtboard id="ob-equip" label="04 Equipment" width={390} height={844}>
            <Frame label="Equipment" {...common}><ScreenOnboardEquipment theme={theme} accent={accent}/></Frame>
          </DCArtboard>
        </DCSection>

        {/* ── Settings ──────────────────────────────── */}
        <DCSection id="settings" title="Settings" subtitle="Language, coach, privacy — kept short.">
          <DCArtboard id="settings-dark" label="Settings" width={390} height={844}>
            <Frame label="Settings" {...common}>
              <ScreenSettings theme={theme} t={t} accent={accent} coach={coach} lang={tw.lang} onLang={(v) => setTweak('lang', v)}/>
              <TabBar active="settings" theme={theme}/>
            </Frame>
          </DCArtboard>
        </DCSection>

        {/* ── Component library ─────────────────────── */}
        <DCSection id="components" title="Components" subtitle="Token + component reference for dev handoff.">
          <DCArtboard id="comp-ref" label="Component library" width={900} height={2100}>
            <ComponentsPage theme={theme} accent={accent}/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {/* Tweaks panel */}
      <TweaksPanel title="AI Coach · Tweaks">
        <TweakSection label="Theme"/>
        <TweakRadio label="Mode" value={tw.mode} options={['dark','light']} onChange={(v) => setTweak('mode', v)}/>
        <TweakColor label="Accent" value={tw.accent} onChange={(v) => setTweak('accent', v)}/>
        <TweakSelect label="Font pairing" value={tw.font} options={[
          {value: 'geist', label: 'Geist + Geist Mono'},
          {value: 'inter', label: 'Inter + JetBrains Mono'},
        ]} onChange={(v) => setTweak('font', v)}/>

        <TweakSection label="User profile"/>
        <TweakRadio label="Gender (also sets coach)" value={tw.gender} options={[
          {value:'f', label:'Woman → Nora'},
          {value:'m', label:'Man → Theo'},
          {value:'x', label:'— → Kai'},
        ]} onChange={(v) => setTweak('gender', v)}/>

        <TweakSection label="Voice session"/>
        <TweakRadio label="Orb state" value={tw.orbState} options={['idle','listening','thinking','speaking']} onChange={(v) => setTweak('orbState', v)}/>

        <TweakSection label="Localization"/>
        <TweakRadio label="Language" value={tw.lang} options={[{value:'en',label:'EN'},{value:'no',label:'NO'}]} onChange={(v) => setTweak('lang', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
