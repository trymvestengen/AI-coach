id: log-set-midworkout
description: Bruker beskriver et sett under aktiv økt — skal logges
persona: friend
base_context: |
  Brukerprofil: Jonas, 34, middels erfaren. Er midt i en økt akkurat nå.
messages:
  - role: user
    text: "Jeg tok nettopp 3 sett knebøy, 10 reps på 60 kilo."
tool_results:
  log_set_with_note:
    ok: true
    logged: true
expect:
  should_call_tools: [log_set_with_note]
  rubric: |
    - Svarer på norsk, kort og oppmuntrende (smart friend).
    - Bekrefter at settet er logget.
    - Finner ikke på tall utover det brukeren oppga.
