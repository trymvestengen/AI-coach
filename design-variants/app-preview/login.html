<!DOCTYPE html>
<html lang="nb" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Coach — Logg inn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="forge.css">
<script src="theme.js"></script>
</head>
<body>
  <div class="phone-frame">
    <div class="screen">

      <!-- status notch -->
      <div class="status-bar"><div class="notch"></div></div>

      <!-- top bar: brand-free pre-auth bar, only the theme toggle -->
      <div class="app-topbar">
        <div class="datebar"><span class="tick"></span>Velkommen</div>
        <button class="theme-toggle" type="button" aria-label="Bytt mellom lyst og mørkt tema" aria-pressed="false">
          <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
          </svg>
          <svg class="i-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
          </svg>
        </button>
      </div>

      <!-- scrollable body — NO bottom nav (pre-auth) -->
      <div class="screen-scroll">

        <!-- brand hero -->
        <section class="hero" style="margin-top:14px">
          <div class="eyebrow">Din personlige trener</div>
          <h1 class="hero-title">AI Coach</h1>
          <p class="hero-sub">Logg treninger, følg progresjon og få coaching som tilpasser seg deg.</p>
        </section>

        <!-- login form -->
        <form style="margin-top:24px;display:flex;flex-direction:column;gap:12px" onsubmit="window.location.href='home.html';return false;">

          <div class="eyebrow" style="margin-bottom:-2px">Logg inn</div>

          <div class="input-row" style="border-radius:var(--r-md);padding:6px 6px 6px 16px">
            <input class="field" type="email" inputmode="email" autocomplete="email"
                   placeholder="E-post" value="trym@example.no" required>
          </div>

          <div class="input-row" style="border-radius:var(--r-md);padding:6px 6px 6px 16px">
            <input class="field" type="password" autocomplete="current-password"
                   placeholder="Passord" value="hemmelig123" required>
          </div>

          <button class="btn btn-primary btn-block" type="submit">
            Logg inn <span class="arrow">→</span>
          </button>

          <!-- helper links -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
            <a class="section-link" href="#">Glemt passord?</a>
            <a class="section-link" href="#">Lag konto</a>
          </div>
        </form>

        <!-- divider -->
        <div class="eyebrow" style="justify-content:center;margin:24px 0 14px;letter-spacing:.2em">
          eller fortsett med
        </div>

        <!-- social sign-in -->
        <div class="panel-list">
          <button class="btn btn-ghost btn-block" type="button" onclick="window.location.href='home.html'">
            <svg width="17" height="17" viewBox="0 0 16 16" aria-hidden="true">
              <path fill="#4285F4" d="M15.68 8.182c0-.566-.05-1.111-.146-1.636H8v3.091h4.305a3.68 3.68 0 0 1-1.594 2.413v2.005h2.582c1.51-1.39 2.387-3.435 2.387-5.873z"/>
              <path fill="#34A853" d="M8 16c2.16 0 3.97-.715 5.293-1.945l-2.582-2.005c-.715.48-1.63.762-2.711.762-2.085 0-3.85-1.408-4.48-3.302H.857v2.069A8 8 0 0 0 8 16z"/>
              <path fill="#FBBC05" d="M3.52 9.51A4.8 4.8 0 0 1 3.27 8c0-.523.09-1.03.25-1.51V4.422H.857A8 8 0 0 0 0 8c0 1.29.31 2.51.857 3.578L3.52 9.51z"/>
              <path fill="#EA4335" d="M8 3.182c1.175 0 2.23.404 3.058 1.198l2.294-2.295C11.965.79 10.155 0 8 0A8 8 0 0 0 .857 4.422L3.52 6.49C4.15 4.596 5.915 3.182 8 3.182z"/>
            </svg>
            Fortsett med Google
          </button>

          <button class="btn btn-ghost btn-block" type="button" onclick="window.location.href='home.html'">
            <svg width="17" height="17" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M11.182.008c-.073.59-.197 1.124-.572 1.586-.34.42-.857.79-1.501.79-.014-.45.16-.91.42-1.234.288-.36.79-.643 1.184-.71l.469-.432zM13.05 12.21c-.354.834-.79 1.624-1.385 2.31-.522.6-1.072 1.21-1.812 1.222-.736.012-.97-.43-1.81-.43-.84 0-1.1.418-1.795.442-.715.024-1.262-.65-1.789-1.249C2.42 13.27 1.255 10.385 2.358 8.43c.546-.966 1.527-1.578 2.59-1.593.704-.013 1.367.473 1.795.473.434 0 1.242-.586 2.094-.5.357.014 1.36.144 2.005 1.087-.05.033-1.197.7-1.183 2.085.012 1.66 1.453 2.213 1.47 2.221z"/>
            </svg>
            Fortsett med Apple
          </button>
        </div>

        <p class="footnote">Ved å logge inn godtar du vilkårene</p>

      </div>

      <!-- NO bottom nav: pre-auth screen -->
    </div>
  </div>
</body>
</html>
