<!DOCTYPE html>
<html lang="nb" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coach — Øvelser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="forge.css">
  <script src="theme.js"></script>
</head>
<body>
  <div class="phone-frame">
    <div class="screen">
      <div class="status-bar"><div class="notch"></div></div>

      <div class="app-topbar">
        <div class="datebar"><span class="tick"></span>fredag 13. juni</div>
        <button class="theme-toggle" type="button" aria-label="Bytt tema" aria-pressed="false">
          <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
          </svg>
          <svg class="i-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
      </div>

      <div class="screen-scroll">

        <!-- Header -->
        <div class="section-head" style="margin:8px 0 14px">
          <div class="section-label">
            <span class="display-title" style="display:block;font-size:40px">Øvelser</span>
            <span class="meta" style="display:block;margin-top:8px;text-transform:none;letter-spacing:0">
              <span class="tnum">247</span> øvelser
            </span>
          </div>
        </div>

        <!-- Search -->
        <div class="input-row" style="margin-bottom:14px">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" style="flex:none;color:var(--muted)">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
          </svg>
          <input class="field" type="text" placeholder="Søk etter øvelse…" aria-label="Søk etter øvelse">
        </div>

        <!-- Muscle group filter chips -->
        <div class="chip-row" style="flex-wrap:nowrap;overflow-x:auto;margin-bottom:18px">
          <button class="chip active" type="button" aria-pressed="true">Alle</button>
          <button class="chip" type="button" aria-pressed="false">Chest</button>
          <button class="chip" type="button" aria-pressed="false">Back</button>
          <button class="chip" type="button" aria-pressed="false">Shoulders</button>
          <button class="chip" type="button" aria-pressed="false">Arms</button>
          <button class="chip" type="button" aria-pressed="false">Legs</button>
          <button class="chip" type="button" aria-pressed="false">Core</button>
        </div>

        <!-- Exercise list -->
        <div class="panel-list">
          <a class="list-row" href="#">
            <div class="row-main">
              <div class="row-name">Benkpress</div>
              <div class="row-meta">Chest · Barbell</div>
            </div>
            <span class="pr-badge">Chest</span>
          </a>
          <a class="list-row" href="#">
            <div class="row-main">
              <div class="row-name">Markløft</div>
              <div class="row-meta">Back · Barbell</div>
            </div>
            <span class="pr-badge">Back</span>
          </a>
          <a class="list-row" href="#">
            <div class="row-main">
              <div class="row-name">Knebøy</div>
              <div class="row-meta">Legs · Barbell</div>
            </div>
            <span class="pr-badge">Legs</span>
          </a>
          <a class="list-row" href="#">
            <div class="row-main">
              <div class="row-name">Skulderpress</div>
              <div class="row-meta">Shoulders · Dumbbell</div>
            </div>
            <span class="pr-badge">Shoulders</span>
          </a>
          <a class="list-row" href="#">
            <div class="row-main">
              <div class="row-name">Bicepscurl</div>
              <div class="row-meta">Arms · Dumbbell</div>
            </div>
            <span class="pr-badge">Arms</span>
          </a>
        </div>

        <div class="footnote">AI Coach · Øvelsesbibliotek</div>

      </div>

      <nav class="bottom-nav" aria-label="Hovednavigasjon">
        <a class="nav-item" href="home.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 11 L12 3 L21 11 L21 20 a1 1 0 0 1 -1 1 h-5 v-7 h-6 v7 h-5 a1 1 0 0 1 -1 -1 z" fill="currentColor"/>
          </svg>
          Hjem
        </a>
        <a class="nav-item" href="program-library.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
            <rect x="3" y="5" width="18" height="5" fill="currentColor"/>
            <rect x="7" y="2" width="2" height="5" rx="0.5" fill="currentColor"/>
            <rect x="15" y="2" width="2" height="5" rx="0.5" fill="currentColor"/>
            <circle cx="8" cy="14" r="1" fill="currentColor"/>
            <circle cx="12" cy="14" r="1" fill="currentColor"/>
            <circle cx="16" cy="14" r="1" fill="currentColor"/>
          </svg>
          Program
        </a>
        <a class="nav-item" href="coach.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6 a2 2 0 0 1 2-2 h12 a2 2 0 0 1 2 2 v8 a2 2 0 0 1 -2 2 h-6 l-4 4 v-4 h-2 a2 2 0 0 1 -2 -2 z" fill="currentColor"/>
            <circle cx="9" cy="10" r="1" fill="var(--plate)"/>
            <circle cx="12" cy="10" r="1" fill="var(--plate)"/>
            <circle cx="15" cy="10" r="1" fill="var(--plate)"/>
          </svg>
          Coach
        </a>
        <a class="nav-item" href="profile.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4" fill="currentColor"/>
            <path d="M4 21 a8 8 0 0 1 16 0" fill="currentColor"/>
          </svg>
          Profil
        </a>
      </nav>

    </div>
  </div>
</body>
</html>
