<!DOCTYPE html>
<html lang="nb" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coach — Historikk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="forge.css">
  <script src="theme.js"></script>
</head>
<body>
  <div class="phone-frame">
    <div class="screen">
      <div class="status-bar"><div class="notch"></div></div>

      <div class="app-topbar">
        <button class="theme-toggle" type="button" aria-label="Tilbake" aria-pressed="false" onclick="history.back()" style="border-radius:999px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <button class="theme-toggle" type="button" aria-label="Bytt tema" aria-pressed="false">
          <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
          </svg>
          <svg class="i-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
      </div>

      <div class="screen-scroll">
        <div class="eyebrow" style="margin-top:6px"><span class="tick" style="width:14px;height:2px;border-radius:2px;background:var(--accent)"></span>Treningslogg</div>
        <h1 class="display-title" style="margin-top:12px">Historikk</h1>

        <div class="panel" style="display:flex;align-items:center;justify-content:space-between;margin-top:18px">
          <div>
            <div style="font-weight:700;font-size:15px;letter-spacing:-.01em">Denne måneden</div>
            <div style="font-size:11.5px;color:var(--muted);margin-top:3px">Fullførte økter i juni</div>
          </div>
          <div style="text-align:right">
            <div class="tnum" style="font-weight:700;font-size:30px;line-height:1;color:var(--accent-deep)">12</div>
            <div style="font-size:10.5px;color:var(--muted);margin-top:4px">økter</div>
          </div>
        </div>

        <div class="section-head">
          <div class="section-label">Siste økter <span class="meta">· kronologisk</span></div>
        </div>

        <div class="panel-list">
          <a class="list-row" href="#">
            <div class="plate-icon">✓</div>
            <div class="row-main">
              <div class="row-name">Push B</div>
              <div class="row-meta">i går · <span class="tnum">18</span> sett · <span class="tnum">52</span> min</div>
            </div>
            <div class="row-trail">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
            </div>
          </a>

          <a class="list-row" href="#">
            <div class="plate-icon">✓</div>
            <div class="row-main">
              <div class="row-name">Legs A</div>
              <div class="row-meta">3 dager siden · <span class="tnum">22</span> sett · <span class="tnum">61</span> min</div>
            </div>
            <div class="row-trail">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
            </div>
          </a>

          <a class="list-row" href="#">
            <div class="plate-icon">✓</div>
            <div class="row-main">
              <div class="row-name">Pull A</div>
              <div class="row-meta">5 dager siden · <span class="tnum">19</span> sett · <span class="tnum">48</span> min</div>
            </div>
            <div class="row-trail">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
            </div>
          </a>

          <a class="list-row" href="#">
            <div class="plate-icon">✓</div>
            <div class="row-main">
              <div class="row-name">Push A</div>
              <div class="row-meta">1 uke siden · <span class="tnum">17</span> sett · <span class="tnum">50</span> min</div>
            </div>
            <div class="row-trail">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
            </div>
          </a>
        </div>

        <div class="footnote">Slutt på logg</div>
      </div>

      <nav class="bottom-nav" aria-label="Hovednavigasjon">
        <a class="nav-item" href="home.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 11 L12 3 L21 11 L21 20 a1 1 0 0 1 -1 1 h-5 v-7 h-6 v7 h-5 a1 1 0 0 1 -1 -1 z" fill="currentColor"/>
          </svg>
          Hjem
        </a>
        <a class="nav-item" href="program-library.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
            <rect x="3" y="5" width="18" height="5" fill="currentColor"/>
            <rect x="7" y="2" width="2" height="5" rx="0.5" fill="currentColor"/>
            <rect x="15" y="2" width="2" height="5" rx="0.5" fill="currentColor"/>
            <circle cx="8" cy="14" r="1" fill="currentColor"/>
            <circle cx="12" cy="14" r="1" fill="currentColor"/>
            <circle cx="16" cy="14" r="1" fill="currentColor"/>
          </svg>
          Program
        </a>
        <a class="nav-item" href="coach.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6 a2 2 0 0 1 2-2 h12 a2 2 0 0 1 2 2 v8 a2 2 0 0 1 -2 2 h-6 l-4 4 v-4 h-2 a2 2 0 0 1 -2 -2 z" fill="currentColor"/>
            <circle cx="9" cy="10" r="1" fill="var(--plate)"/>
            <circle cx="12" cy="10" r="1" fill="var(--plate)"/>
            <circle cx="15" cy="10" r="1" fill="var(--plate)"/>
          </svg>
          Coach
        </a>
        <a class="nav-item" href="profile.html">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4" fill="currentColor"/>
            <path d="M4 21 a8 8 0 0 1 16 0" fill="currentColor"/>
          </svg>
          Profil
        </a>
      </nav>
    </div>
  </div>
</body>
</html>
