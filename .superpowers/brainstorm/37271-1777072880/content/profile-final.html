<h2>Profil-siden — slik ser den ut</h2>
<p class="subtitle">Read-only oversikt. Logg ut nederst.</p>

<div class="mockup">

    <!-- Avatar + navn -->

      <div style="width:56px;height:56px;border-radius:50%;background:#2a2a2a;border:2px solid #333;overflow:hidden;flex-shrink:0;">

      </div>
      <div>
        <div style="font-weight:600;color:#fff;font-size:17px;">Ola Nordmann</div>
        <div style="color:#666;font-size:13px;">ola@example.com</div>
      </div>
    </div>

    <!-- Mål -->
    <div style="margin-bottom:12px;">
      <div style="color:#555;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">Mål</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <span style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;font-size:13px;color:#ccc;">Bygg muskler</span>
        <span style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;font-size:13px;color:#ccc;">Bli sterkere</span>

    </div>

    <!-- Stats-grid -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;">
      <div style="background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:12px;">
        <div style="color:#555;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Erfaring</div>
        <div style="color:#fff;font-size:14px;font-weight:500;">Middels</div>
      </div>
      <div style="background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:12px;">
        <div style="color:#555;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Frekvens</div>
        <div style="color:#fff;font-size:14px;font-weight:500;">3–4 dager/uke</div>
      </div>
      <div style="background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:12px;">
        <div style="color:#555;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Høyde · Vekt</div>

        <div style="color:#555;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Alder</div>
        <div style="color:#fff;font-size:14px;font-weight:500;">30 år</div>
      </div>

    <div style="border-top:1px solid #1a1a1a;padding-top:16px;">
      <button style="width:100%;background:transparent;border:1px solid #3a1a1a;border-radius:10px;padding:14px;color:#ff4444;font-size:15px;cursor:pointer;">
